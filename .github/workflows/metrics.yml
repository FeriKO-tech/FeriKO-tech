name: GitHub Metrics
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          base: header, community
          base_indepth: yes
          config_timezone: Europe/Kyiv
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_lines: yes
          plugin_lines_sections: base
